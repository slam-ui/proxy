name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version or tag, for example v0.9.4"
        required: true

permissions:
  contents: write

env:
  GO_VERSION: "1.26.2"
  GOTOOLCHAIN: go1.26.2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build Release Artifacts
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Run tests
        shell: pwsh
        run: |
          go build ./...
          $env:GOOS = 'linux'
          $env:GOARCH = 'amd64'
          go build ./...
          Remove-Item Env:GOOS -ErrorAction SilentlyContinue
          Remove-Item Env:GOARCH -ErrorAction SilentlyContinue
          go test ./... -count=1 -race -timeout=10m
          node --check internal/api/static/js/00-core.js
          node --check internal/api/static/js/10-servers.js
          node --check internal/api/static/js/20-navigation.js
          node --check internal/api/static/js/30-rules-processes.js
          node --check internal/api/static/js/40-logs.js
          node --check internal/api/static/js/50-settings-theme.js
          node --check internal/api/static/js/70-runtime-polling.js
          node --check internal/api/static/js/80-chart-utils-init.js

      - name: Install WiX
        shell: pwsh
        run: dotnet tool install --global wix

      - name: Package release
        shell: pwsh
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          $version = "${{ github.event.inputs.version }}"
          if (-not $version) { $version = "${{ github.ref_name }}" }
          $base = "https://github.com/${{ github.repository }}/releases/download/$version"
          .\build\package-release.ps1 -Version $version -UpdateBaseURL $base

      - name: Smoke test version metadata
        shell: pwsh
        run: |
          $meta = Get-ChildItem dist/release/artifacts/version.*.json | Select-Object -First 1
          if (-not $meta) { throw "version metadata not generated" }
          $json = Get-Content $meta.FullName -Raw | ConvertFrom-Json
          if (-not $json.version -or -not $json.sha256 -or -not $json.download_url) {
            throw "version metadata is incomplete"
          }
          Get-ChildItem dist/release/artifacts/SHA256SUMS.txt | Out-Null

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ github.event.inputs.version }}"
          if (-not $version) { $version = "${{ github.ref_name }}" }
          $versionNoPrefix = $version.TrimStart("v")
          $isPrerelease = if ($versionNoPrefix -match "-") { "true" } else { "false" }
          $notes = Join-Path $env:RUNNER_TEMP "release-notes.md"
          @"
          SafeSky $version

          See CHANGELOG.md and SHA256SUMS.txt in the assets below.

          Assets:
          - MSI installer for per-user installs
          - Portable ZIP
          - Raw SafeSky.exe payload for auto-update
          - proxy-updater.exe
          - version.<channel>.json update metadata
          "@ | Set-Content -Path $notes -Encoding UTF8
          gh release create $version dist/release/artifacts/* --title "SafeSky $version" --notes-file $notes --prerelease=$isPrerelease --verify-tag
