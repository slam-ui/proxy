name: Go CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── 1. BUILD (gate) ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet (Windows target)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go vet ./...

      - name: Build Windows executable
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags "-H windowsgui -s -w" \
            -o proxy-client.exe \
            ./cmd/proxy-client

      - uses: actions/upload-artifact@v4
        with:
          name: proxy-client-windows
          path: proxy-client.exe
          retention-days: 5

  # ── 2. UNIT TESTS ────────────────────────────────────────────────────────────
  # Запускаем только пакеты без Windows-only зависимостей.
  # internal/proxy импортирует golang.org/x/sys/windows/registry (нет build tag) →
  # падает на Linux. internal/api зависит от internal/proxy → тоже падает.
  # Запускаем напрямую только чистые пакеты; api/proxy тестируются через build.
  test:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run unit tests with race detector
        run: |
          go test -race -timeout=120s \
            ./internal/anomalylog/... \
            ./internal/apprules/... \
            ./internal/config/... \
            ./internal/eventlog/... \
            ./internal/logger/... \
            ./internal/netutil/...

      - name: Generate coverage report
        run: |
          go test -timeout=120s \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./internal/anomalylog/... \
            ./internal/apprules/... \
            ./internal/config/... \
            ./internal/eventlog/... \
            ./internal/logger/... \
            ./internal/netutil/...
          echo "── Coverage by package ──────────────────────────────────────"
          go tool cover -func=coverage.out | grep -v "^total" | awk '{print $1, $3}' | sort -t: -k1
          echo "────────────────────────────────────────────────────────────"
          go tool cover -func=coverage.out | tail -1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 5

  # ── 3. STATIC ANALYSIS ───────────────────────────────────────────────────────
  staticcheck:
    name: Staticcheck
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck (Windows target)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: staticcheck ./...

  # ── 4. GOSEC ─────────────────────────────────────────────────────────────────
  gosec:
    name: Gosec SAST
    needs: build
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run gosec
        uses: securego/gosec@v2.21.4
        with:
          args: >-
            -no-fail
            -exclude=G304,G306
            -fmt sarif
            -out gosec.sarif
            ./...

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec.sarif
        if: always()

  # ── 5. SEMGREP ───────────────────────────────────────────────────────────────
  sast:
    name: Semgrep SAST
    needs: build
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: semgrep scan --config=p/golang --sarif --output=semgrep.sarif
        continue-on-error: true

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
        if: always()

  # ── 6. CODEQL ────────────────────────────────────────────────────────────────
  # CodeQL требует нативную компиляцию. Собираем только кросс-платформенные
  # пакеты — Windows-only (cmd/proxy-client, proxy, window) пропускаем.
  codeql:
    name: CodeQL Analysis
    needs: build
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          queries: security-extended

      - name: Build cross-platform packages for CodeQL
        # cmd/proxy-client и несколько internal пакетов — Windows-only.
        # Собираем только то что компилируется на Linux.
        run: |
          go build ./internal/anomalylog/...
          go build ./internal/apprules/...
          go build ./internal/config/...
          go build ./internal/eventlog/...
          go build ./internal/logger/...
          go build ./internal/netutil/...
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"

  # ── 7. DEPENDENCY SCAN ───────────────────────────────────────────────────────
  dependency-scan:
    name: Dependency Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck (Windows target)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: govulncheck -json ./... > govulncheck.json 2>&1 || true

      - name: Print vulnerabilities summary
        if: always()
        run: |
          python3 -c "
          import json
          try:
              data = [json.loads(l) for l in open('govulncheck.json') if l.strip()]
              vulns = [d for d in data if 'finding' in d]
              print(f'Findings: {len(vulns)}')
          except: pass
          " 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: govulncheck-report
          path: govulncheck.json
          retention-days: 5

  # ── 8. SECRET SCANNING ───────────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 9. LICENSE CHECK ─────────────────────────────────────────────────────────
  license-check:
    name: License Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: Check licenses (Windows target)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go-licenses check ./... \
            --allowed_licenses=MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0