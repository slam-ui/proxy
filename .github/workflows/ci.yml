name: CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"

# Cancel stale runs for the same branch / PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default; jobs that upload SARIF override below
permissions:
  contents: read

env:
  GO_VERSION: '1.24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── 1. BUILD: proxy-client.exe (Windows cross-compile) ──────────────────────
  build:
    name: Build (proxy-client)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOOS: windows
      GOARCH: amd64
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Verify module integrity
        run: go mod verify && go mod tidy && git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -ldflags "-H windowsgui -s -w" -o proxy-client.exe ./cmd/proxy-client

      - uses: actions/upload-artifact@v4
        with:
          name: proxy-client-windows
          path: proxy-client.exe
          retention-days: 7

  # ── 2. TEST: cross-platform packages (race detector + coverage) ──────────────
  # Windows-only packages (proxy, api, wintun, engine, tray, window, xray …)
  # import golang.org/x/sys/windows and cannot compile on Linux — excluded here,
  # tested on the native Windows runner in test-windows below.
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Run tests (race + coverage)
        run: |
          go test -race -timeout=120s \
            -coverprofile=coverage.out -covermode=atomic \
            ./internal/anomalylog/... \
            ./internal/apprules/... \
            ./internal/config/... \
            ./internal/eventlog/... \
            ./internal/fileutil/... \
            ./internal/logger/... \
            ./internal/netutil/...
          go tool cover -func=coverage.out | tail -1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  # ── 3. TEST: Windows-only packages on a native runner ───────────────────────
  # Compiles the full tree (including packages that use golang.org/x/sys/windows)
  # and runs the api handler tests that are excluded from the Linux job.
  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Build (verify all Windows packages compile)
        run: go build ./...

      - name: Run cross-platform tests
        run: |
          go test -timeout=120s \
            ./internal/anomalylog/... \
            ./internal/apprules/... \
            ./internal/config/... \
            ./internal/eventlog/... \
            ./internal/fileutil/... \
            ./internal/logger/... \
            ./internal/netutil/...

      - name: Run API handler tests
        run: go test -timeout=120s ./internal/api/...

      - name: Run Windows package tests
        run: |
          go test -timeout=120s \
            ./cmd/proxy-client/... \
            ./internal/engine/... \
            ./internal/process/... \
            ./internal/proxy/... \
            ./internal/tray/... \
            ./internal/wintun/... \
            ./internal/xray/...

  # ── 4. FUZZ: short regression fuzzing, two targets in parallel ───────────────
  # Runs each target for 30 s — enough to replay the corpus and explore new paths.
  fuzz:
    name: Fuzz / ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - { pkg: ./internal/apprules/, target: FuzzNormalizePattern }
          - { pkg: ./internal/config/,   target: FuzzParseVLESSURL    }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Fuzz ${{ matrix.target }}
        run: go test -run=^$ -fuzz=${{ matrix.target }} -fuzztime=30s ${{ matrix.pkg }}

  # ── 5. LINT: staticcheck (Windows target) ───────────────────────────────────
  # GOOS must NOT be set at job level: it causes go install to produce a Windows
  # binary (.exe) that cannot run on the Linux runner (exit 127).
  # Install the tool first (native Linux binary), then analyse with GOOS=windows.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2025.1.1

      - name: Run staticcheck (Windows target)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: staticcheck ./...

  # ── 6. SECURITY: gosec + govulncheck in one job ──────────────────────────────
  # GOOS must NOT be set at job level: it causes go install to produce a Windows
  # binary (.exe) that cannot run on the Linux runner (exit 127).
  # Set GOOS=windows only in the individual analysis steps.
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Run gosec (Windows target)
        uses: securego/gosec@v2.21.4
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        with:
          args: >-
            -no-fail -exclude=G304,G306
            -fmt sarif -out gosec.sarif ./...

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec.sarif

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.3

      - name: Run govulncheck (Windows target)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          govulncheck -json ./... > govulncheck.json 2>&1 || true
          python3 - <<'EOF'
          import json
          data = []
          for l in open("govulncheck.json"):
              if not l.strip():
                  continue
              try:
                  data.append(json.loads(l))
              except json.JSONDecodeError:
                  pass
          vulns = [d for d in data if "finding" in d]
          print(f"Vulnerability findings: {len(vulns)}")
          for v in vulns:
              f = v["finding"]
              osv = f.get("osv", "?")
              fn  = f.get("trace", [{}])[0].get("function", "?")
              print(f"  - {osv}: {fn}")
          EOF

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            gosec.sarif
            govulncheck.json
          retention-days: 7

  # ── 7. CODEQL ────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-extended

      - name: Build (Linux-compatible packages only)
        continue-on-error: true
        run: |
          go build \
            ./internal/anomalylog/... \
            ./internal/apprules/... \
            ./internal/config/... \
            ./internal/eventlog/... \
            ./internal/fileutil/... \
            ./internal/logger/... \
            ./internal/netutil/...

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"

  # ── 8. SECRET SCAN ───────────────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 9. LICENSE CHECK ─────────────────────────────────────────────────────────
  # GOOS must NOT be set at job level: go install would produce go-licenses.exe
  # which cannot run on Linux (exit 127).
  license-check:
    name: License Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@v1.6.0

      - name: Check licenses (Windows target)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          go-licenses check ./... \
            --allowed_licenses=MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0

  # ── 10. CI GATE ──────────────────────────────────────────────────────────────
  # Single required status check for branch protection rules.
  # Add only this job to "Required status checks" in repo settings.
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [build, test, test-windows, fuzz, lint, security, codeql, gitleaks, license-check]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          declare -A results=(
            [build]="${{ needs.build.result }}"
            [test]="${{ needs.test.result }}"
            [test-windows]="${{ needs.test-windows.result }}"
            [fuzz]="${{ needs.fuzz.result }}"
            [lint]="${{ needs.lint.result }}"
            [security]="${{ needs.security.result }}"
            [codeql]="${{ needs.codeql.result }}"
            [gitleaks]="${{ needs.gitleaks.result }}"
            [license-check]="${{ needs.license-check.result }}"
          )
          failed=0
          for job in "${!results[@]}"; do
            echo "${job}: ${results[$job]}"
            [[ "${results[$job]}" != "success" ]] && failed=1
          done
          exit $failed
