name: Go CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet (Windows target)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go vet ./...

      - name: Build Windows executable
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags "-H windowsgui -s -w" \
            -o build/proxy-client.exe \
            ./cmd/proxy-client

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxy-client-windows
          path: build/proxy-client.exe
          retention-days: 5

  sast:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Semgrep Security Scan
        run: semgrep scan --config=p/golang --sarif --output=semgrep.sarif
        continue-on-error: true

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
        if: always()

  dependency-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck (Windows target)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: govulncheck ./...